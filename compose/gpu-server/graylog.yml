services:
  # Graylog stores configuration in MongoDB
  mongo:
    image: mongo:7.0-jammy
    container_name: mongodb
    volumes:
      - /mnt/data/mongodb/db:/data/db
      #- "mongo_data:/data/db"
    networks:
      t3_proxy:
    restart: unless-stopped
    profiles: ["all"]
  # The logs themselves are stored in Opensearch
  opensearch:
    image: opensearchproject/opensearch:2.19.5
    container_name: opensearch
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "action.auto_create_index=false"
      - "plugins.security.ssl.http.enabled=false"
      - "plugins.security.disabled=true"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=SetPassw0rdL3ttersAndNumb3r5"
    volumes:
      - /mnt/storage/data/opensearch:/usr/share/opensearch/data
     # - "log_data:/usr/share/opensearch/data"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200/tcp
    networks:
      t3_proxy:
    restart: unless-stopped
    profiles: ["all"]

  graylog:
    image: graylog/graylog:7.1
    container_name: graylog
    environment:
      # CHANGE ME (must be at least 16 characters)!
      GRAYLOG_PASSWORD_SECRET: "1AyI8HIaxSwlpEYiQAUrIBJPmDF0ZSswzEe7aB58lYzGR5wMinkqf0mCI8YBiYvm2tXyyBjRWWYV8fBAYQQVJWjG5kKRrZ8AIIkSlBM2ifwuPT2IQoHhvr0XSLp33vqO"
      # Password: admin
      GRAYLOG_ROOT_PASSWORD_SHA2: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"
      GRAYLOG_HTTP_BIND_ADDRESS: "0.0.0.0:9000"
      GRAYLOG_HTTP_EXTERNAL_URI: "https://graylog-gui.maynard.cloud/"
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://opensearch:9200"
      GRAYLOG_MONGODB_URI: "mongodb://mongodb:27017/graylog"
      GRAYLOG_TIMEZONE: "America/Detroit"
      TZ: "America/Detroit"
      GRAYLOG_TRANSPORT_EMAIL_PROTOCOL: "smtp"
      GRAYLOG_TRANSPORT_EMAIL_WEB_INTERFACE_URL: "http://192.168.3.233:9000/"
      GRAYLOG_TRANSPORT_EMAIL_HOSTNAME: "outbound.mailhop.org"
      GRAYLOG_TRANSPORT_EMAIL_ENABLED: "true"
      GRAYLOG_TRANSPORT_EMAIL_PORT: "587"
      GRAYLOG_TRANSPORT_EMAIL_USE_AUTH: "true"
      GRAYLOG_TRANSPORT_EMAIL_AUTH_USERNAME: "xxxxx"
      GRAYLOG_TRANSPORT_EMAIL_AUTH_PASSWORD: "xxxxx"
      GRAYLOG_TRANSPORT_EMAIL_USE_TLS: "true"
      GRAYLOG_TRANSPORT_EMAIL_USE_SSL: "false"
      GRAYLOG_TRANSPORT_FROM_EMAIL: "noreply@example.com"
      GRAYLOG_TRANSPORT_SUBJECT_PREFIX: "[graylog]"
      GRAYLOG_IS_LEADER: "true"
      #GRAYLOG_HTTP_MAX_HEADER_SIZE: "32768"
      PUID: 1100
      PGID: 1100

    entrypoint: /usr/bin/tini -- wait-for-it opensearch:9200 -- /docker-entrypoint.sh
    volumes:
      - /mnt/data/graylog/config:/usr/share/graylog/data/config
      - /mnt/data/graylog:/usr/share/graylog/data
      #- /mnt/data/graylog/config/office_ip_map.csv:/usr/share/graylog/data/office_ip_map.csv
      #- /mnt/data/graylog/server/geoip/GeoLite2-City.mmdb:/etc/graylog/server/geoip/GeoLite2-City.mmdb
      - /mnt/data/graylog/plugin:/usr/share/graylog/plugin
    profiles: ["all"]

    networks:
      t3_proxy:
    restart: always
    depends_on:
      opensearch:
        condition: "service_started"
      mongo:
        condition: "service_started"
    ports:
      - 9006:9000/tcp   # Graylog web interface and REST API
      #- 5060:5060/udp
      - 5555:5555/udp
      - 1514:1514/tcp   # Syslog
      - 1514:1514/udp   # Syslog
      - 1515:1515/udp   # Syslog
      #- 12201:12201/tcp # GELF
      #- 12202:12202/tcp # GELF
      - 12201:12201/udp # GELF
    labels:

      - "traefik.enable=true"
      # --- Web UI router (humans → Authelia) ---
      - "traefik.http.routers.graylog-rtr.entrypoints=websecure-internal,websecure-external"
      - "traefik.http.routers.graylog-rtr.rule=Host(`graylog.$DOMAINNAME_1`)"
      - "traefik.http.routers.graylog-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.graylog-rtr.priority=100"
      - "traefik.http.routers.graylog-rtr.service=graylog-svc"
      - "traefik.http.services.graylog-svc.loadbalancer.server.port=9000"

      # --- API router (/api → no auth, token-based) ---
      - "traefik.http.routers.graylog-api-rtr.entrypoints=websecure-internal,websecure-external"
      - "traefik.http.routers.graylog-api-rtr.rule=Host(`graylog.$DOMAINNAME_1`) && PathPrefix(`/api`)"
      - "traefik.http.routers.graylog-api-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.graylog-api-rtr.priority=200"
      - "traefik.http.routers.graylog-api-rtr.service=graylog-svc"