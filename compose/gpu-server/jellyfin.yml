services:
  # Jellyfin - Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["media", "all"]
    networks:
      - t3_proxy
    user: "$PUID:$PGID"          # official image uses user:, NOT PUID/PGID env vars
    ports:
      - "$JELLYFIN_PORT:8096"
    volumes:
      - $DOCKERDIR/appdata/jellyfin/config:/config   # fresh dir — LSIO layout is incompatible
      - $DOCKERDIR/appdata/jellyfin/cache:/cache      # official image keeps cache separate
      - $MEDIADIR1/movies:/data/movies
      - $MEDIADIR1/tv:/data/tv
    environment:
      TZ: $TZ
      JELLYFIN_PublishedServerUrl: https://jellyfin.$DOMAINNAME_1
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.jellyfin-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.jellyfin-rtr.rule=Host(`jellyfin.$DOMAINNAME_1`)"
      - "traefik.http.routers.jellyfin-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.jellyfin-rtr.service=jellyfin-svc"
      - "traefik.http.services.jellyfin-svc.loadbalancer.server.port=8096"