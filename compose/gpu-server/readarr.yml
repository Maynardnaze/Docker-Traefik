services:
  # Readarr - Books Management
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr
    #security_opt:
    #  - no-new-privileges:true
    restart: unless-stopped
    profiles: ["media", "starr", "all"]
    networks:
      - t3_proxy
#    ports:
#      - "$READARR_PORT:8787"
    volumes:
      - $DOCKERDIR/appdata/readarr:/config
      - $MEDIADIR1:/mnt/media
      #- $DOWNLOADSDIR:/data/downloads 
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.readarr-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.readarr-rtr.rule=Host(`readarr.$DOMAINNAME_1`)"
      - "traefik.http.routers.readarr-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.readarr-rtr.service=readarr-svc"
      - "traefik.http.services.readarr-svc.loadbalancer.server.port=8787"
