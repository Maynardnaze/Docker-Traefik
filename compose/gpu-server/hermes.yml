  # Hermes Dashboard - connects to bare-metal gateway on Proxmox VM
  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["ai", "all"]
    command: dashboard --host 0.0.0.0 --insecure
        networks:
      - t3_proxy
    ports:
      - "$HERMES_DASH_PORT:9119"
    volumes:
      - $DOCKERDIR/hermes:/opt/data
    environment:
      TZ: $TZ
      GATEWAY_HEALTH_URL: "http://$HERMES_VM_IP:8642"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-dash-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.hermes-dash-rtr.rule=Host(`hermes-dash.$DOMAINNAME_1`)"
      - "traefik.http.routers.hermes-dash-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.hermes-dash-rtr.service=hermes-dash-svc"
      - "traefik.http.services.hermes-dash-svc.loadbalancer.server.port=9119"