services:
  # LazyLibrarian - Books Management
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["media", "arr", "all"]  # ⚠️ See note below
    networks:
      - t3_proxy
    #ports:
    #  - "$LAZYLIBRARIAN_PORT:5299"
    volumes:
      - $DOCKERDIR/appdata/lazylibrarian:/config
      - $DOWNLOADSDIR:/mnt/media
       # See note below — books/media path needs your env var
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lazylibrarian-rtr.entrypoints=websecure-internal"
      - "traefik.http.routers.lazylibrarian-rtr.rule=Host(`lazylibrarian.$DOMAINNAME_1`)"
      - "traefik.http.routers.lazylibrarian-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.lazylibrarian-rtr.service=lazylibrarian-svc"
      - "traefik.http.services.lazylibrarian-svc.loadbalancer.server.port=5299"
