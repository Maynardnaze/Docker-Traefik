services:
  # Cloudflare Tunnel - Secure tunnel to expose services without opening firewall ports
  # Traffic flow: Internet → Cloudflare Edge → cloudflared → traefik:444 (websecure-external)
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["core", "all"]
    networks:
      - t3_proxy
    secrets:
      - cloudflared_tunnel_token
    volumes:
      - $DOCKERDIR/appdata/cloudflared/run-from-secret.sh:/run-from-secret.sh:ro
    command: /run-from-secret.sh
