services:
  telnyx-mall-directory:
    container_name: telnyx-mall-directory
    build:
      context: $DOCKERDIR/appdata/telnyx-mall-directory
    restart: unless-stopped
    profiles: ["core", "all"]
    networks:
      - t3_proxy
    environment:
      - TZ=$TZ
      - DIRECTORY_WEBHOOK_SECRET_FILE=/run/secrets/telnyx_directory_webhook_secret
      - GUEST_SERVICES_PHONE=${TELNYX_DIRECTORY_GUEST_SERVICES_PHONE:-+124****0000}
    secrets:
      - telnyx_directory_webhook_secret
    labels:
      - "traefik.enable=true"
      # Public webhook/API route. Do not put this behind Authelia/Access; Telnyx authenticates with x-directory-secret.
      - "traefik.http.routers.telnyx-directory-rtr.rule=Host(`telnyx-directory.$DOMAINNAME_1`)"
      - "traefik.http.routers.telnyx-directory-rtr.entrypoints=websecure-external"
      - "traefik.http.routers.telnyx-directory-rtr.tls=true"
      - "traefik.http.routers.telnyx-directory-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.telnyx-directory-rtr.service=telnyx-directory-svc"
      - "traefik.http.services.telnyx-directory-svc.loadbalancer.server.port=8787"
